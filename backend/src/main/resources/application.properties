# Puerto del servidor
server.port=8080

# ── H2 Database ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:BD_lindo_jhonn_T1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ── JWT ─────────────────────────────────────────────────────────────────
# SEGURIDAD: en produccion mover a variable de entorno (no commitear secretos).
# La clave debe tener >= 256 bits (32+ chars) para HMAC-SHA256.
jwt.secret=${JWT_SECRET:uqAiSolutionSecretKey2026ProgramacionSeguraDD281MustBe256bitsLong}
jwt.expiration=86400000

# ── CORS ────────────────────────────────────────────────────────────────
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000}
